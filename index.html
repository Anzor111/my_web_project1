{% extends "base.html" %}

{% block title %}Главная{% endblock %}

{% block content %}
<div class="text-center my-5">
    <h1>Добро пожаловать в HealthTrack!</h1>
    <p class="lead">Приложение для отслеживания веса, питания и тренировок</p>
    {% if current_user.is_authenticated %}
        <a href="{{ url_for('dashboard') }}" class="btn btn-primary btn-lg">Перейти в дашборд</a>
    {% else %}
        <div>
            <a href="{{ url_for('login') }}" class="btn btn-outline-primary">Войти</a>
            <a href="{{ url_for('register') }}" class="btn btn-primary">Зарегистрироваться</a>
        </div>
    {% endif %}
</div>
{% endblock %}

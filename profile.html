{% extends "base.html" %}

{% block title %}Профиль{% endblock %}

{% block content %}
<h2>Мой профиль</h2>
<form method="POST">
    <div class="mb-3">
        <label class="form-label">Вес (кг)</label>
        <input type="number" step="0.1" name="weight" class="form-control" value="{{ profile.weight or '' }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Рост (см)</label>
        <input type="number" name="height" class="form-control" value="{{ profile.height or '' }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Целевой вес (кг)</label>
        <input type="number" step="0.1" name="target_weight" class="form-control" value="{{ profile.target_weight or '' }}" required>
    </div>
    <button type="submit" class="btn btn-primary">Сохранить изменения</button>
</form>
{% endblock %}
